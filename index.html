{id:"c11-47",ch:"Ch 11",cat:"Nutritional Types",term:"Chemolithoheterotroph",definition:"Chemical energy from inorganic compounds, but uses organic carbon source. Mixotrophic lifestyle.",pathway:"",details:["Energy: inorganic chemical oxidation","Carbon: organic molecules","Mix of litho and hetero","Less common nutritional type"],connections:["Chemolithoautotroph","Nutritional types"],examTip:""},
{id:"c12-40",ch:"Ch 12",cat:"Biosynthesis",term:"NADPH vs NADH in Biosynthesis",definition:"NADPH is the reducing agent for anabolic reactions. NADH delivers electrons to ETC for energy. Different roles despite similar structure.",pathway:"",details:["NADPH = biosynthesis (anabolism)","NADH = ETC (energy/catabolism)","PPP is main source of NADPH","Extra phosphate on NADPH distinguishes it","Ensures separation of catabolic and anabolic electron flow"],connections:["PPP","ETC","Anabolism","Catabolism"],examTip:"Why PPP is essential: provides NADPH for all biosynthesis"},
];

// ===== BIG PICTURE QUESTIONS =====
const BIGPIC=[
{ch:"Ch 10-11",q:"Why does the PPP run simultaneously with EMP, and what would happen if PPP were absent?",hint:"Think about what PPP provides that EMP cannot.",answer:"PPP provides NADPH (reducing power for ALL biosynthesis) and precursor metabolites (R5P for nucleotides, E4P for aromatic amino acids) that EMP cannot produce. Without PPP, cells would lack NADPH for anabolic reactions and could not synthesize nucleotides or aromatic amino acids. EMP provides ATP and different precursor metabolites. Together they supply everything the cell needs: energy (ATP), reducing power (NADPH), and all 12 precursor metabolites."},
{ch:"Ch 10-11",q:"How does feedback inhibition of PFK1 affect the entire aerobic respiration process?",hint:"PFK1 controls the gateway to all downstream pathways.",answer:"PFK1 is inhibited by ATP and citrate (signals of energy abundance). When inhibited, glycolysis slows -> less pyruvate produced -> less acetyl-CoA for TCA -> less NADH/FADH2 for ETC -> less oxidative phosphorylation. This creates a cascade: the entire aerobic respiration system slows down when energy is plentiful. Conversely, when ATP is low (high AMP/ADP), PFK1 is activated, speeding up the entire process. PFK1 acts as the master switch for catabolic flux."},
{ch:"Ch 11",q:"Explain why fermentation produces dramatically less ATP than respiration.",hint:"Consider what happens to NADH in each process.",answer:"In respiration, NADH donates electrons to the ETC, which creates PMF to drive ATP synthase. Each NADH yields ~2.5 ATP. In fermentation, there is NO ETC. NADH is used simply to reduce pyruvate (to lactate or ethanol), regenerating NAD+ so glycolysis can continue. The energy stored in NADH is essentially wasted - dumped into the organic end product. Result: fermentation = 2 ATP (glycolysis SLP only), respiration = ~32 ATP (SLP + OP from all NADH/FADH2). Respiration is ~16x more efficient."},
{ch:"Ch 11-12",q:"Trace a carbon atom from glucose through glycolysis, TCA cycle, and into the amino acid glutamate.",hint:"Follow the carbon through specific intermediates.",answer:"Glucose (6C) -> split in glycolysis -> pyruvate (3C) -> transition reaction removes 1 CO2 -> acetyl-CoA (2C) -> enters TCA by combining with OAA (4C) -> citrate (6C) -> isocitrate (6C) -> alpha-ketoglutarate (5C, after losing CO2). Alpha-ketoglutarate is a precursor metabolite. Through reductive amination (adding NH4+ via glutamate dehydrogenase) or the GS-GOGAT system, alpha-ketoglutarate + NH4+ -> glutamate (amino acid). This shows how carbon flows from catabolism directly into anabolism."},
{ch:"Ch 11-12",q:"Why are amphibolic pathways essential, and what happens when TCA intermediates are depleted for biosynthesis?",hint:"Think about the dual role of TCA and how the cell compensates.",answer:"Amphibolic pathways (like TCA) serve BOTH catabolism (energy) and anabolism (precursor metabolites). When TCA intermediates like alpha-ketoglutarate or OAA are pulled out for amino acid synthesis, the cycle would stall without replacement. Anaplerotic reactions solve this: PEP carboxylase adds CO2 to PEP -> OAA, refilling the cycle. Without anaplerotic reactions, biosynthesis would drain TCA intermediates, stopping both energy production AND further biosynthesis. This balance is the seesaw of metabolism."},
{ch:"Ch 10-11",q:"How does the cell decide between catabolism and anabolism? What signals control this decision?",hint:"Consider energy charge and allosteric regulation.",answer:"The cell uses energy charge as the master signal. High ATP (high energy) -> inhibits catabolic enzymes (PFK1 inhibited by ATP) -> activates anabolic pathways. Low ATP / high AMP-ADP -> activates catabolic enzymes (PFK1 activated by AMP) -> inhibits biosynthesis. Feedback inhibition prevents overproduction of end products. Covalent modifications (phosphorylation) provide additional regulation. Gene expression controls enzyme levels long-term. The result is a dynamic balance: when energy is abundant, the cell builds; when energy is scarce, it breaks down fuel."},
{ch:"Ch 10",q:"Why does the ETC release energy in multiple small steps rather than one big reaction?",hint:"Consider what happens to released energy.",answer:"If NADH transferred electrons directly to O2 in one step, the large energy release (-52.44 kcal/mol) would be mostly lost as heat - like burning fuel in an explosion. By using the ETC with multiple carriers of gradually increasing E'0, energy is released in small, manageable amounts at each step. Each step can be coupled to proton pumping across the membrane, creating PMF. This stepwise process captures ~40% of the energy as ATP, far more efficient than a single-step reaction. It is like descending a staircase vs jumping off a cliff."},
{ch:"Ch 11",q:"Compare the three glycolytic pathways: when would each be advantageous?",hint:"Consider ATP yield, NADPH production, and enzyme cost.",answer:"EMP: Best for rapid ATP production (2 ATP/glucose), used when energy is primary need. Has 10 enzymes but produces most ATP. Used by most organisms. ED: Uses fewer enzymes (cheaper to maintain), produces NADPH (useful for biosynthesis). Advantageous for organisms in nutrient-rich environments where maximal ATP not critical (e.g., Pseudomonas in soil with abundant organics). PPP: Produces NO ATP but generates NADPH for biosynthesis and R5P for nucleotides. Essential when cell is actively growing and needs building materials. All three can run simultaneously."},
{ch:"Ch 11-12",q:"A bacterium is growing in minimal medium with glucose and NH4Cl. Trace how it makes the amino acid phenylalanine.",hint:"Think about which pathways and precursor metabolites are needed.",answer:"(1) Glucose enters EMP -> produces PEP (precursor metabolite from glycolysis). (2) Simultaneously, glucose enters PPP -> produces Erythrose-4P (E4P, precursor metabolite from PPP). (3) PEP + E4P enter the shikimate pathway -> chorismate -> phenylalanine. (4) The amino group comes from glutamate via transaminase (PLP-dependent). (5) Glutamate was made from alpha-ketoglutarate (TCA cycle) + NH4+ (from NH4Cl). This shows how EMP, PPP, TCA, and nitrogen assimilation all integrate for one amino acid."},
{ch:"Ch 11",q:"Why does FADH2 yield less ATP than NADH in the ETC?",hint:"Consider where each enters the chain.",answer:"NADH donates electrons to Complex I (NADH dehydrogenase), which pumps 4 H+. Electrons then pass through CoQ -> Complex III (4 H+) -> Cyt c -> Complex IV (2 H+). Total: 10 H+ pumped. FADH2 donates electrons to Complex II (succinate dehydrogenase), which does NOT pump protons. Electrons enter at CoQ level, bypassing Complex I entirely. So only Complex III (4 H+) and Complex IV (2 H+) pump protons. Total: 6 H+ pumped. Fewer protons = less PMF = less ATP: ~2.5 for NADH vs ~1.5 for FADH2."},
{ch:"Ch 12",q:"Why can't cells make glucose from fatty acids (via acetyl-CoA)?",hint:"Think about the transition reaction.",answer:"The transition reaction (pyruvate -> acetyl-CoA) is IRREVERSIBLE. There is no enzyme that converts acetyl-CoA back to pyruvate. In the TCA cycle, the 2 carbons from acetyl-CoA are lost as 2 CO2 (at isocitrate DH and alpha-KG DH steps). So there is no net carbon gain from acetyl-CoA to make glucose. Gluconeogenesis requires pyruvate or later glycolytic intermediates. Since fatty acid breakdown produces only acetyl-CoA (via beta-oxidation), fatty acids cannot be converted to glucose. This is a fundamental metabolic constraint."},
{ch:"Ch 10-12",q:"How do sulfa drugs connect enzyme inhibition (Ch 10) to nucleotide synthesis (Ch 12) to killing bacteria?",hint:"Follow the chain: PABA -> folic acid -> nucleotides -> growth.",answer:"(1) Ch 10: Sulfa drugs are structural analogs of PABA and act as competitive inhibitors of dihydropteroate synthase. (2) This blocks folic acid (tetrahydrofolate) synthesis. (3) Ch 12: Folic acid is essential for one-carbon transfers in nucleotide synthesis (both purines and pyrimidines). (4) Without nucleotides, bacteria cannot make DNA/RNA -> cannot grow or divide. (5) Humans are unaffected because we obtain folic acid from diet (we lack the synthetic enzyme). This spans enzyme regulation, biosynthesis, and selective toxicity."},
{ch:"Ch 11",q:"Explain how the proton motive force (PMF) serves four different cellular functions.",hint:"ATP is not the only use of PMF.",answer:"(1) ATP synthesis: PMF drives protons through ATP synthase (F0F1), powering the rotary motor that makes ATP (chemiosmosis). (2) Flagellar rotation: PMF drives proton flow through the flagellar motor (MotA/MotB), spinning the flagellum for motility. (3) Active transport: PMF provides energy for proton-coupled transport of nutrients across the membrane (symport/antiport). (4) Reverse electron flow: Some chemolithotrophs use PMF energy to push electrons backward from donors with high E'0 to reduce NAD+ (which has lower E'0). PMF is a universal energy currency of the membrane."},
{ch:"Ch 12",q:"Why is the distinction between assimilatory and dissimilatory nitrate reduction so important?",hint:"One builds, one generates energy. Completely different purposes.",answer:"Assimilatory: NO3- -> NO2- -> NH4+ (anabolic). Purpose is to obtain nitrogen for building amino acids. Consumes energy. NH4+ is incorporated into glutamate via GS-GOGAT. Occurs when NH4+ is unavailable. Dissimilatory: NO3- -> NO2- -> N2 (catabolic/denitrification). Purpose is ENERGY generation - NO3- serves as terminal electron acceptor in anaerobic respiration ETC. Produces ATP. The N2 is lost to atmosphere. Occurs in anaerobic conditions. Same starting molecule (NO3-) but completely opposite metabolic purposes and consequences."},
{ch:"Ch 10-12",q:"Design a concept map connecting these terms: PFK1, ATP, PEP, pyruvate, acetyl-CoA, TCA cycle, OAA, aspartate, feedback inhibition.",hint:"Start with glycolysis and follow the flow.",answer:"PFK1 (pacemaker of glycolysis) is inhibited by ATP (feedback inhibition) and activated by AMP. PFK1 controls flow to PEP -> pyruvate (via pyruvate kinase). Pyruvate -> acetyl-CoA (irreversible transition reaction). Acetyl-CoA + OAA -> enters TCA cycle. TCA generates ATP (via NADH -> ETC). High ATP inhibits PFK1 (feedback loop!). OAA (TCA intermediate) can be pulled out for aspartate synthesis (transamination). If OAA depleted, anaplerotic reactions refill from PEP. This shows the interconnected regulation from glycolysis through TCA to biosynthesis."},
{ch:"Ch 11",q:"A cell switches from aerobic to anaerobic conditions. Describe what changes metabolically.",hint:"Think about what O2 does and what replaces it.",answer:"(1) O2 no longer available as terminal electron acceptor. (2) If alternative acceptors available (NO3-, SO4(2-)): switch to anaerobic respiration. Still use ETC but less ATP (lower delta-E'0). (3) If NO alternative acceptors: switch to fermentation. ETC shuts down. Only glycolysis SLP for ATP (2 per glucose). Must regenerate NAD+ by reducing pyruvate. (4) ATP yield drops dramatically (32 -> 2). (5) Cell must increase glucose consumption rate to compensate. (6) PFK1 becomes more active (low ATP = relieved inhibition). (7) Fermentation products accumulate (lactate, ethanol, etc.)."},
{ch:"Ch 12",q:"Explain why the 12 precursor metabolites represent a critical bridge between catabolism and anabolism.",hint:"They are the connection points.",answer:"The 12 precursor metabolites are intermediates of catabolic pathways (EMP, PPP, TCA) that serve as carbon skeletons for ALL biosynthesis. They are the physical connection between catabolism and anabolism. From EMP (6): G6P (polysaccharides), F6P (peptidoglycan), G3P (lipids), 3PG (serine family), PEP (aromatic AAs), pyruvate (Ala, Val, Leu). From PPP (3-4): R5P (nucleotides), E4P (aromatic AAs), S7P. From TCA (3): Acetyl-CoA (fatty acids), alpha-KG (glutamate family), OAA (aspartate family). Without these, catabolism cannot feed anabolism."},
{ch:"Ch 12",q:"How does a nitrogen-fixing bacterium in a legume root nodule solve the O2 problem?",hint:"Nitrogenase is O2-sensitive but the bacteroid needs O2 for respiration.",answer:"Nitrogenase is irreversibly inactivated by O2, yet Rhizobium needs O2 for aerobic respiration (ATP production). Solution: the plant produces leghemoglobin (similar to hemoglobin), which binds O2 tightly, keeping free O2 concentration very low while still delivering O2 to the bacteroid for respiration. This creates a microaerobic environment: enough O2 for respiration but too little to damage nitrogenase. Additionally, the bacteroid has high-affinity terminal oxidases (like bd oxidase) that can function at very low O2 concentrations. Nitrogen fixation requires 16 ATP per N2, so respiration must continue."},
{ch:"Ch 11",q:"Compare the efficiency of ATP production from glucose using aerobic respiration versus fermentation. Why might fermentation still be advantageous?",hint:"Efficiency is not the only consideration.",answer:"Aerobic: ~32 ATP per glucose (~40% energy capture). Fermentation: 2 ATP per glucose (~2% energy capture). Despite being 16x less efficient, fermentation is advantageous when: (1) No O2 available (obligate fermenters, anaerobic environments). (2) Speed matters: fermentation is FASTER than respiration (no ETC bottleneck), allowing rapid growth when nutrients abundant. (3) Simpler machinery: no ETC complexes needed, fewer enzymes to synthesize. (4) Fermentation products can inhibit competitors (lactic acid lowers pH, ethanol is toxic). (5) Some organisms lack ETC genes entirely."},
{ch:"Ch 10",q:"Use the Nernst equation to explain why aerobic respiration yields more energy than using NO3- as terminal acceptor.",hint:"Compare E'0 values and calculate delta-G for each.",answer:"Nernst equation: delta-G' = -nF(delta-E'0). For NADH (-0.32V) to O2 (+0.82V): delta-E'0 = 1.14V, delta-G' = -(2)(23)(1.14) = -52.44 kcal/mol. For NADH (-0.32V) to NO3-/NO2- (+0.42V): delta-E'0 = 0.74V, delta-G' = -(2)(23)(0.74) = -34.04 kcal/mol. Aerobic releases 52.44 vs 34.04 kcal/mol - about 54% more energy per electron pair. This translates to more protons pumped, higher PMF, and more ATP. Rule 2 of redox: greater delta-E'0 = more energy, and O2 has the highest E'0 of common acceptors."},
];

// ===== FILTERING =====
function getFilteredFC(){
  if(activeCats.size===0) return FC;
  return FC.filter(f=>activeCats.has(f.ch)||activeCats.has(f.cat));
}

// ===== NAV =====
function setMode(m){
  mode=m;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+m).classList.add('active');
  ['flashcard','quiz','pathway','map','bigpic','compare'].forEach(v=>{
    document.getElementById('mode-'+v).classList.toggle('hidden',v!==m);
  });
  if(m==='flashcard'){fcIdx=0;flipped=false;renderFC();}
  else if(m==='quiz') nxtQ();
  else if(m==='pathway') renderPathway();
  else if(m==='map') renderMap();
  else if(m==='bigpic'){bpIdx=0;renderBP();}
  else if(m==='compare') renderCompare();
  buildCatPills();
  updateStats();
}

// ===== CATEGORY PILLS =====
function buildCatPills(){
  const el=document.getElementById('catF');
  const chapters=["Ch 10","Ch 11","Ch 12"];
  let h='';
  // Chapter pills (prominent)
  chapters.forEach(c=>{
    const col=CH_COLORS[c]||'#8b7aff';
    const isOn=activeCats.has(c);
    h+=`<span class="cat-pill ch-pill${isOn?' on':''}" onclick="toggleCat('${c}')" style="border-color:${col};${isOn?'background:'+col+'22;color:'+col:''}">${c}</span>`;
  });
  // Separator
  h+='<span class="cat-sep"></span>';
  // Topic pills (smaller, grouped)
  const topicsByCh={"Ch 10":["Energy","Redox","Electron Carriers","Enzymes","Regulation"],"Ch 11":["Nutritional Types","Glycolysis","ED Pathway","PPP","TCA Cycle","ETC","ATP Yield","Anaerobic Resp","Fermentation","Chemolithotrophy"],"Ch 12":["Precursor Metabolites","CO2 Fixation","Gluconeogenesis","Nitrogen","Amino Acids","Nucleotides","Fatty Acids","Peptidoglycan","Phosphorus","Biosynthesis"]};
  // Only show topics for active chapters (or all if none selected)
  const activeChapters=chapters.filter(c=>activeCats.has(c));
  const showChapters=activeChapters.length?activeChapters:chapters;
  showChapters.forEach(ch=>{
    const topics=topicsByCh[ch]||[];
    topics.forEach(t=>{
      h+=`<span class="cat-pill topic${activeCats.has(t)?' on':''}" onclick="toggleCat('${t}')">${t}</span>`;
    });
  });
  el.innerHTML=h;
}
function toggleCat(c){activeCats.has(c)?activeCats.delete(c):activeCats.add(c);buildCatPills();if(mode==='flashcard'){fcIdx=0;flipped=false;renderFC();}else if(mode==='map')renderMap();updateStats();}

// ===== STATS =====
function updateStats(){
  const fc=getFilteredFC();
  const m=fc.filter(f=>mastered[f.id]).length;
  document.getElementById('sT').textContent=fc.length;
  document.getElementById('sM').textContent=m;
  document.getElementById('sS').textContent=streak;
  document.getElementById('sA').textContent=qTotal?Math.round(qCorrect/qTotal*100)+'%':'0%';
  document.getElementById('pF').style.width=(fc.length?Math.round(m/fc.length*100):0)+'%';
}

// ===== FLASHCARD =====
function renderFC(){
  const fc=getFilteredFC();
  if(!fc.length){document.getElementById('mode-flashcard').innerHTML='<div style="color:#444;text-align:center;padding:40px">No cards match filter</div>';return;}
  if(fcIdx>=fc.length)fcIdx=0;
  const c=fc[fcIdx];
  const col=CAT_COLORS[c.cat]||'#8b7aff';
  const chCls=c.ch.replace(' ','').toLowerCase();
  let h=`<div class="fc" onclick="flipFC()">
    <span class="tag" style="background:${col}22;color:${col};border:1px solid ${col}44">${c.cat}</span>
    <span class="idx">${fcIdx+1}/${fc.length}</span>`;
  if(!flipped){
    h+=`<span class="ch-badge ${chCls}">${c.ch}</span>
    <div class="term-name">${c.term}</div>
    <div class="term-sub" style="color:#555">${c.pathway?c.pathway+' \u2022 ':''}<span style="color:${col}">${c.cat}</span></div>
    <div class="tap">Tap to reveal</div>`;
  } else {
    h+=`<span class="ch-badge ${chCls}">${c.ch}</span>
    <div class="details">
      <div class="detail-row"><div class="detail-label">Definition</div><div class="detail-val">${c.definition}</div></div>`;
    if(c.pathway) h+=`<div class="detail-row"><div class="detail-label">Pathway</div><div class="pills"><span class="pill pill-pathway">${c.pathway}</span></div></div>`;
    if(c.details&&c.details.length) h+=`<div class="detail-row"><div class="detail-label">Key Points</div><div class="pills">${c.details.map(d=>'<span class="pill pill-pathway">'+d+'</span>').join('')}</div></div>`;
    if(c.connections&&c.connections.length) h+=`<div class="detail-row"><div class="detail-label">Connections</div><div class="pills">${c.connections.map(cn=>'<span class="pill pill-connection">'+cn+'</span>').join('')}</div></div>`;
    if(c.examTip) h+=`<div class="exam-tip">\u26a0 ${c.examTip}</div>`;
    h+=`</div>`;
  }
  h+=`</div>`;
  h+=`<div class="ctrls">
    <button class="c-no" onclick="markFC(false)">Missed</button>
    <button onclick="nextFC()">Skip</button>
    <button class="c-yes" onclick="markFC(true)">Got it</button>
    <button onclick="shuffleFC()">Shuffle</button>
  </div>`;
  document.getElementById('mode-flashcard').innerHTML=h;
}
function flipFC(){flipped=!flipped;renderFC();}
function nextFC(){const fc=getFilteredFC();fcIdx=(fcIdx+1)%fc.length;flipped=false;renderFC();}
function prevFC(){const fc=getFilteredFC();fcIdx=(fcIdx-1+fc.length)%fc.length;flipped=false;renderFC();}
function markFC(v){const fc=getFilteredFC();if(!fc.length)return;const c=fc[fcIdx];if(v){mastered[c.id]=true;streak++;}else{delete mastered[c.id];streak=0;}save();nextFC();updateStats();}
function shuffleFC(){const a=FC;for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];}fcIdx=0;flipped=false;renderFC();}

// ===== QUIZ =====
let curQ=null;
function nxtQ(){
  const pool=activeCats.size?QUIZ.filter(q=>activeCats.has(q.ch)):QUIZ;
  if(!pool.length){document.getElementById('qT').textContent='No questions match filter';return;}
  curQ=pool[Math.floor(Math.random()*pool.length)];
  document.getElementById('qL').textContent=curQ.ch;
  document.getElementById('qT').textContent=curQ.q;
  document.getElementById('qR').textContent='';
  const fb=document.getElementById('qF');fb.className='qz-fb';fb.textContent='';
  const el=document.getElementById('qO');
  el.innerHTML=curQ.opts.map((o,i)=>`<div class="qz-o" onclick="ansQ(${i})">${o}</div>`).join('');
}
function ansQ(i){
  qTotal++;
  const opts=document.querySelectorAll('.qz-o');
  opts.forEach((o,j)=>{o.classList.add('off');if(j===curQ.ans)o.classList.add('ok');if(j===i&&j!==curQ.ans)o.classList.add('bad');});
  const fb=document.getElementById('qF');
  if(i===curQ.ans){qCorrect++;streak++;fb.className='qz-fb show gd';fb.textContent='Correct! '+curQ.exp;}
  else{streak=0;fb.className='qz-fb show bd';fb.textContent='Incorrect. '+curQ.exp;}
  save();updateStats();
}

// ===== PATHWAY EXPLORER =====
function renderPathway(){
  const wrap=document.getElementById('mode-pathway');
  let h=`<div class="pw-select-row"><select class="pw-select" onchange="selPathway=this.value;openPwStep=-1;renderPathway()">`;
  PATHWAYS.forEach(p=>{h+=`<option value="${p.id}"${p.id===selPathway?' selected':''}>${p.name}</option>`;});
  h+=`</select></div>`;
  const pw=PATHWAYS.find(p=>p.id===selPathway);
  if(!pw){wrap.innerHTML=h+'<div class="cmp-empty">Select a pathway</div>';return;}
  h+=`<div class="pw-info">
    <div class="pw-title">${pw.name}</div>
    <div class="pw-loc">${pw.location} | ${pw.chapter}</div>
    <div class="pw-desc">${pw.significance}</div>
    <div class="pw-yield">`;
  if(pw.netYield.atp)h+=`<span class="yd yd-atp">${pw.netYield.atp>0?'+':''}${pw.netYield.atp} ATP</span>`;
  if(pw.netYield.nadh)h+=`<span class="yd yd-nadh">${pw.netYield.nadh>0?'+':''}${pw.netYield.nadh} NADH</span>`;
  if(pw.netYield.nadph)h+=`<span class="yd yd-nadph">${pw.netYield.nadph>0?'+':''}${pw.netYield.nadph} NADPH</span>`;
  if(pw.netYield.fadh2)h+=`<span class="yd yd-fadh2">${pw.netYield.fadh2>0?'+':''}${pw.netYield.fadh2} FADH2</span>`;
  if(pw.netYield.co2)h+=`<span class="yd yd-co2">${pw.netYield.co2>0?'+':''}${pw.netYield.co2} CO2</span>`;
  if(pw.netYield.gtp)h+=`<span class="yd yd-atp">+${pw.netYield.gtp} GTP</span>`;
  h+=`</div>`;
  if(pw.precursorMetabolites.length){
    h+=`<div style="margin-top:8px"><span style="font-size:.68rem;color:#ffd700">Precursor Metabolites: </span>`;
    h+=pw.precursorMetabolites.map(p=>`<span class="pill pill-precursor">${p}</span>`).join(' ');
    h+=`</div>`;
  }
  h+=`</div>`;
  h+=`<div class="pw-steps">`;
  pw.steps.forEach((s,i)=>{
    const isPrecursor=pw.precursorMetabolites.includes(s.substrate)||s.precursor;
    const isProdPrecursor=pw.precursorMetabolites.includes(s.product);
    const isCost=s.energyChange.includes('-')&&s.energyChange!=='--';
    const isGain=s.energyChange.includes('+');
    h+=`<div class="pw-step-row" onclick="togglePwStep(${i})">
      <span class="pw-step-arrow">${i===0?'':'-->'}</span>
      <div class="pw-step-content${isPrecursor?' precursor':''}${isCost?' energy-cost':''}${isGain?' energy-gain':''}">
        <span class="sc-name">${s.substrate}${isPrecursor?' *':''}</span>
        <span class="sc-enzyme">${s.enzyme}</span>
        <span class="sc-energy${isCost?' cost':''}${isGain?' gain':''}">${s.energyChange!=='--'?s.energyChange:''}</span>
      </div>
    </div>`;
    if(openPwStep===i){
      h+=`<div class="pw-detail-popup">
        <div class="dp-title">${s.substrate} -> ${s.product}</div>
        <div class="dp-row"><div class="dp-label">Enzyme</div><div class="dp-val">${s.enzyme}</div></div>
        <div class="dp-row"><div class="dp-label">Energy Change</div><div class="dp-val">${s.energyChange==='--'?'None':s.energyChange}</div></div>
        <div class="dp-row"><div class="dp-label">Notes</div><div class="dp-val">${s.notes}</div></div>
        ${isPrecursor?'<div class="dp-row"><div class="dp-label" style="color:#ffd700">Precursor Metabolite</div><div class="dp-val" style="color:#ffd700">Used as starting material for biosynthesis</div></div>':''}
      </div>`;
    }
  });
  // Final product
  const lastStep=pw.steps[pw.steps.length-1];
  const lastPrecursor=pw.precursorMetabolites.includes(lastStep.product);
  h+=`<div class="pw-step-row">
    <span class="pw-step-arrow">--></span>
    <div class="pw-step-content${lastPrecursor?' precursor':''}" style="border-color:#8b7aff">
      <span class="sc-name" style="color:#8b7aff">${lastStep.product}${lastPrecursor?' *':''}</span>
      <span class="sc-enzyme" style="color:#888">Final product</span>
    </div>
  </div>`;
  h+=`</div>`;
  h+=`<div style="margin-top:10px;font-size:.68rem;color:#ffd700">* = Precursor metabolite</div>`;
  h+=`<div style="margin-top:4px;font-size:.68rem;color:#ff6b6b">Red border = energy consumed</div>`;
  h+=`<div style="font-size:.68rem;color:#4ade80">Green border = energy produced</div>`;
  h+=`<div style="font-size:.68rem;color:#ffd700">Gold border = precursor metabolite</div>`;
  wrap.innerHTML=h;
}
function togglePwStep(i){openPwStep=openPwStep===i?-1:i;renderPathway();}

// ===== CONCEPT MAP =====
function renderMap(){
  const fc=getFilteredFC();
  const el=document.getElementById('mode-map');
  el.innerHTML=fc.map(c=>{
    const col=CAT_COLORS[c.cat]||'#8b7aff';
    const chCol=CH_COLORS[c.ch]||'#888';
    return `<div class="mc${mastered[c.id]?' done':''}" onclick="mastered['${c.id}']?delete mastered['${c.id}']:mastered['${c.id}']=true;save();renderMap();updateStats();" style="border-left-color:${col}">
      <span class="mc-cat" style="background:${col}22;color:${col}">${c.cat}</span>
      <span class="mc-ch" style="background:${chCol}" title="${c.ch}"></span>
      <div class="mc-name">${c.term}</div>
      <div class="mc-def">${c.definition.substring(0,100)}${c.definition.length>100?'...':''}</div>
      ${c.pathway?'<div class="mc-pathway">'+c.pathway+'</div>':''}
      ${c.examTip?'<div class="mc-key">'+c.examTip+'</div>':''}
    </div>`;
  }).join('');
}

// ===== BIG PICTURE =====
function renderBP(){
  const wrap=document.getElementById('mode-bigpic');
  if(!BIGPIC.length){wrap.innerHTML='<div class="cmp-empty">No questions</div>';return;}
  if(bpIdx>=BIGPIC.length)bpIdx=0;
  const b=BIGPIC[bpIdx];
  let h=`<div class="bp-card">
    <div class="bp-ch">${b.ch} | Question ${bpIdx+1} of ${BIGPIC.length}</div>
    <div class="bp-q">${b.q}</div>
    <button class="bp-hint-btn" onclick="this.textContent=this.textContent.startsWith('Show')?'Hint: ${b.hint.replace(/'/g,"\\'")}':'Show Hint'">${'Show Hint'}</button>
    <button class="bp-hint-btn" style="color:#4ade80;border-color:#1a3a22" onclick="document.getElementById('bpA').classList.toggle('show')">Show/Hide Answer</button>
    <div class="bp-answer" id="bpA">
      <h4>Answer</h4>
      ${b.answer}
    </div>
  </div>`;
  h+=`<div class="bp-nav">
    <button class="ctrls" style="display:inline"><button onclick="bpIdx=(bpIdx-1+BIGPIC.length)%BIGPIC.length;renderBP();" style="padding:7px 18px;border-radius:7px;border:1px solid #1e1e2e;background:#141420;color:#bbb;cursor:pointer;font-size:.82rem">Prev</button></button>
    <button onclick="bpIdx=(bpIdx+1)%BIGPIC.length;renderBP();" style="padding:7px 18px;border-radius:7px;border:1px solid #1e1e2e;background:#141420;color:#bbb;cursor:pointer;font-size:.82rem">Next</button>
    <button onclick="bpIdx=Math.floor(Math.random()*BIGPIC.length);renderBP();" style="padding:7px 18px;border-radius:7px;border:1px solid #8b7aff;background:#141420;color:#8b7aff;cursor:pointer;font-size:.82rem">Random</button>
  </div>`;
  wrap.innerHTML=h;
}

// ===== COMPARE =====
let cmpPreset=0;
function renderCompare(){
  const wrap=document.getElementById('mode-compare');
  let h='<div class="cmp-presets">';
  COMPARISONS.forEach((c,i)=>{h+=`<span class="cmp-preset" onclick="cmpPreset=${i};renderCompare()">${c.a} vs ${c.b}</span>`;});
  h+='</div>';
  if(cmpPreset>=COMPARISONS.length)cmpPreset=0;
  const cmp=COMPARISONS[cmpPreset];
  h+=`<table class="cmp-table"><thead><tr>
    <th>Aspect</th><th class="col-a">${cmp.a}</th><th class="col-b">${cmp.b}</th>
  </tr></thead><tbody>`;
  cmp.rows.forEach(r=>{
    const isDiff=r.a!==r.b;
    h+=`<tr><td>${r.label}</td><td${isDiff?' class="diff"':''}>${r.a}</td><td${isDiff?' class="diff"':''}>${r.b}</td></tr>`;
  });
  h+=`</tbody></table>`;
  wrap.innerHTML=h;
}

// ===== KEYBOARD =====
document.addEventListener('keydown',e=>{
  if(mode==='flashcard'){
    if(e.code==='Space'){e.preventDefault();flipFC();}
    if(e.code==='KeyN'||e.code==='ArrowRight')nextFC();
    if(e.code==='ArrowLeft')prevFC();
  }
  if(mode==='bigpic'){
    if(e.code==='ArrowRight'){bpIdx=(bpIdx+1)%BIGPIC.length;renderBP();}
    if(e.code==='ArrowLeft'){bpIdx=(bpIdx-1+BIGPIC.length)%BIGPIC.length;renderBP();}
  }
});

// ===== INIT =====
buildCatPills();
updateStats();
renderFC();
</script>
</body>
